name: CI/CD for Dockerized Flask App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # The redundant 'dockerbuild' job has been completely removed to prevent the file crash.
  
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest

    - name: Run tests
      run: |
        pytest

  build-and-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      id: docker_build_step
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./DockerFile  # Verified standard lowercase 'f'
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/flasktest-app:latest
          ${{ secrets.DOCKER_USERNAME }}/flasktest-app:${{ github.sha }}

    - name: Image digest
      run: echo ${{ steps.docker_build_step.outputs.digest }}
